name: Release

# Publishes to npm when a version tag is pushed, e.g.:
#   npm version patch && git push --follow-tags
# Requires an NPM_TOKEN repository secret (an npm automation token).
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write # enables npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Verify the tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME (=$TAG) does not match package.json version $PKG" >&2
            exit 1
          fi

      # prepublishOnly runs check + test + check:package + build before this publishes.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
